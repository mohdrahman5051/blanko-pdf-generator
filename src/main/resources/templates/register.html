<!DOCTYPE html>
<html>
<head>
    <title>Register - Blanko</title>
</head>
<body>

<h1>Create Account</h1>

<form action="/register" method="post">

    <p>Name</p>
    <input type="text" name="name">

    <p>Email</p>
    <input type="email" name="email">

    <p>Password</p>
    <input type="password" name="password">

    <br><br>

    <button type="submit">
        Create Account
    </button>

</form>

</body>
</html>
